name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug APKs (phone + wear)
        run: ./gradlew :app:assembleDebug :wear:assembleDebug --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7

      - name: Upload phone APK
        uses: actions/upload-artifact@v4
        with:
          name: glucoripper-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload wear APK
        uses: actions/upload-artifact@v4
        with:
          name: glucoripper-wear-debug-${{ github.sha }}
          path: wear/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
