name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/name for the release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/release.jks"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble signed release APKs (phone + wear)
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :wear:assembleRelease --stacktrace

      - name: Rename APKs
        id: apk
        run: |
          phone_src=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          wear_src=$(ls wear/build/outputs/apk/release/*.apk | head -n 1)
          phone_dest="glucoripper-${{ steps.tag.outputs.value }}.apk"
          wear_dest="glucoripper-wear-${{ steps.tag.outputs.value }}.apk"
          cp "$phone_src" "$phone_dest"
          cp "$wear_src" "$wear_dest"
          echo "phone=$phone_dest" >> "$GITHUB_OUTPUT"
          echo "wear=$wear_dest" >> "$GITHUB_OUTPUT"

      - name: Upload phone APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.phone }}
          path: ${{ steps.apk.outputs.phone }}
          if-no-files-found: error
          retention-days: 90

      - name: Upload wear APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.wear }}
          path: ${{ steps.apk.outputs.wear }}
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            ${{ steps.apk.outputs.phone }}
            ${{ steps.apk.outputs.wear }}
